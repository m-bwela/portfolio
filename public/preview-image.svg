<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0533;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2d1b4e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d0015;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed" />
      <stop offset="100%" style="stop-color:#a78bfa" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <rect x="80" y="290" width="120" height="4" rx="2" fill="url(#accent)" />
  <text x="80" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="#ffffff">Tye Nzambu</text>
  <text x="80" y="360" font-family="system-ui, -apple-system, sans-serif" font-size="36" fill="#a78bfa">Full Stack Developer</text>
  <text x="80" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#9ca3af">React • Node.js • JavaScript • Python</text>
  <!-- Decorative circles -->
  <circle cx="1050" cy="150" r="80" fill="none" stroke="#7c3aed" stroke-width="2" opacity="0.3" />
  <circle cx="1080" cy="180" r="120" fill="none" stroke="#a78bfa" stroke-width="1.5" opacity="0.2" />
  <circle cx="1000" cy="400" r="60" fill="none" stroke="#7c3aed" stroke-width="1.5" opacity="0.25" />
  <!-- Code brackets decoration -->
  <text x="950" y="350" font-family="monospace" font-size="200" fill="#7c3aed" opacity="0.08">&lt;/&gt;</text>
</svg>
